<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meet daeeseD</title>
    <link rel="icon" type="image/svg+xml" href="./163762b92dafb24a12c1ce5b7080bd1e.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-start: #800026;
        --bg-end: #20000c;
        --card: rgba(0, 0, 0, 0.685);
        --card-border: rgba(189, 0, 104, 0.342);
        --text: #e7eef7;
        --muted: #9caac0;
        --accent: #9e002f;
        --accent-2: #440114;
        --button-bg: rgba(255, 255, 255, 0.07);
        --button-hover: rgba(255, 255, 255, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        width: 100%;
        overflow-x: clip;
      }

      body {
        font-family: "Space Grotesk", sans-serif;
        color: var(--text);
        background: radial-gradient(
            circle at 20% 15%,
            rgba(0, 0, 0, 0.336) 0,
            rgba(242, 184, 74, 0) 38%
          ),
          radial-gradient(
            circle at 80% 80%,
            rgba(0, 0, 0, 0.384) 0,
            rgba(111, 208, 222, 0) 35%
          ),
          linear-gradient(155deg, var(--bg-start), var(--bg-end));
        display: grid;
        place-items: center;
        overflow-x: hidden;
      }

      .noise {
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.08;
        background-image: radial-gradient(#ffffff 0.45px, transparent 0.45px);
        background-size: 2px 2px;
      }

      .halo {
        position: fixed;
        border-radius: 999px;
        filter: blur(42px);
        opacity: 0.38;
        pointer-events: none;
        animation: float 12s ease-in-out infinite;
      }

      .halo-1 {
        width: 260px;
        height: 260px;
        top: -90px;
        left: -80px;
        background: #080000b2;
      }

      .halo-2 {
        width: 220px;
        height: 220px;
        right: -70px;
        bottom: -50px;
        background: #00000088;
        animation-delay: -6s;
      }

      .site {
        width: min(620px, 92vw);
        max-width: 100%;
        margin: 24px auto;
        padding: 0 8px;
        position: relative;
        z-index: 2;
        animation: fade-in 0.75s ease both;
      }

      .card {
        border: 1px solid var(--card-border);
        border-radius: 22px;
        background: var(--card);
        backdrop-filter: blur(12px);
        padding: 28px 22px;
        width: 100%;
        overflow: clip;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
      }

      .top {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .avatar {
        width: 78px;
        height: 78px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid rgba(255, 255, 255, 0.28);
      }

      .name-wrap {
        min-width: 0;
      }

      .name {
        margin: 0;
        font-family: "Bebas Neue", sans-serif;
        letter-spacing: 1px;
        font-size: clamp(2.1rem, 3.5vw, 2.8rem);
        line-height: 0.92;
      }

      .handle {
        margin: 4px 0 0;
        color: var(--muted);
        font-weight: 500;
      }

      .bio {
        margin: 18px 0 8px;
        color: #d2deee;
        line-height: 1.52;
      }

      .badges {
        list-style: none;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 16px 0 0;
        padding: 0;
      }

      .badges li {
        font-size: 0.83rem;
        border: 1px solid rgba(255, 255, 255, 0.16);
        padding: 6px 10px;
        border-radius: 999px;
        color: #d9e7f9;
        background: rgba(255, 255, 255, 0.04);
      }

      .section-title {
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        margin: 24px 2px 10px;
      }

      .tabs {
        display: flex;
        gap: 8px;
        margin: 24px 0 12px;
      }

      .tab-btn {
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 0.82rem;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 160ms ease, border-color 160ms ease;
      }

      .tab-btn[aria-selected="true"] {
        background: rgba(255, 255, 255, 0.14);
        border-color: rgba(255, 255, 255, 0.35);
      }

      .tab-panel[hidden] {
        display: none;
      }

      .links {
        display: grid;
        gap: 10px;
        min-width: 0;
      }

      .link-btn {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        column-gap: 12px;
        min-width: 0;
        width: 100%;
        max-width: 100%;
        text-decoration: none;
        cursor: pointer;
        color: var(--text);
        padding: 12px 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        background: var(--button-bg);
        transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
        transform: translateY(14px);
        opacity: 0;
        animation: slide-up 0.45s ease forwards;
      }

      .link-btn:hover {
        background: var(--button-hover);
        border-color: rgba(255, 255, 255, 0.3);
        transform: translateY(-1px);
      }

      .link-btn .left {
        display: block;
        flex: 1 1 auto;
        font-weight: 600;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .now-playing-left {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        max-width: 100%;
        min-width: 0;
      }

      .now-playing-cover {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        object-fit: cover;
        flex-shrink: 0;
        border: 1px solid rgba(255, 255, 255, 0.14);
      }

      .now-playing-text {
        display: flex;
        flex: 1 1 auto;
        flex-direction: column;
        min-width: 0;
      }

      .now-playing-title {
        display: block;
        font-weight: 600;
        max-width: 100%;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .now-playing-title-inner {
        display: inline-block;
        white-space: nowrap;
        transform: translateX(0);
      }

      .now-playing-title.is-scrolling {
        text-overflow: clip;
      }

      .now-playing-title.is-scrolling .now-playing-title-inner {
        animation: marquee-x var(--marquee-duration, 8s) linear infinite alternate;
      }

      .now-playing-subtitle {
        display: block;
        font-size: 0.8rem;
        color: var(--muted);
        max-width: 100%;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .link-btn .right {
        color: var(--accent-2);
        font-size: 0.83rem;
      }

      .socials {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        min-width: 0;
      }

      .projects {
        display: grid;
        gap: 10px;
      }

      .project-card {
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 12px;
        padding: 12px 14px;
        background: rgba(255, 255, 255, 0.04);
      }

      .project-title {
        margin: 0;
        font-size: 1rem;
      }

      .project-desc {
        margin: 6px 0 0;
        color: #d2deee;
        font-size: 0.93rem;
        line-height: 1.4;
      }

      .project-links-empty {
        margin: 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .socials a {
        text-decoration: none;
        color: var(--text);
        cursor: pointer;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 0.9rem;
        background: rgba(255, 255, 255, 0.05);
      }

      .socials a:hover {
        border-color: rgba(255, 255, 255, 0.28);
      }

      .footer {
        margin-top: 18px;
        color: var(--muted);
        font-size: 0.83rem;
        text-align: center;
      }

      @keyframes fade-in {
        from {
          opacity: 0;
          transform: translateY(18px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes slide-up {
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translate(0, 0);
        }

        50% {
          transform: translate(10px, -12px);
        }
      }

      @keyframes marquee-x {
        from {
          transform: translateX(0);
        }

        to {
          transform: translateX(calc(-1 * var(--marquee-distance, 0px)));
        }
      }

      @media (max-width: 640px) {
        .site {
          width: min(620px, 100vw);
          margin: 14px auto;
          padding: 0 10px;
        }

        .card {
          padding: 20px 16px;
          border-radius: 16px;
        }

        .top {
          align-items: flex-start;
        }

        .avatar {
          width: 66px;
          height: 66px;
        }

        .tabs {
          margin: 20px 0 10px;
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .tab-btn {
          width: 100%;
          padding: 9px 8px;
          font-size: 0.75rem;
          text-align: center;
        }

        .link-btn {
          padding: 11px 12px;
          gap: 10px;
          align-items: flex-start;
        }

        .link-btn .right {
          flex-shrink: 0;
          font-size: 0.77rem;
          white-space: nowrap;
          padding-top: 2px;
        }

        .now-playing-cover {
          width: 34px;
          height: 34px;
        }

        .socials {
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .socials a {
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="noise"></div>
    <div class="halo halo-1"></div>
    <div class="halo halo-2"></div>

    <main class="site">
      <article class="card">
        <section class="top">
          <img
            class="avatar"
            id="avatar"
            src="https://images.unsplash.com/photo-1527980965255-d3b416303d12?q=80&w=256&auto=format&fit=crop"
            alt="Profile avatar"
          />
          <div class="name-wrap">
            <h1 class="name" id="displayName">DAEESE</h1>
            <p class="handle" id="handle">@daeese</p>
          </div>
        </section>

        <p class="bio" id="bio">
          Designer/developer crafting interfaces that feel alive. Building digital things,
          collecting inspiration, and sharing work in public.
        </p>

        <ul class="badges" id="badges"></ul>

        <div class="tabs" role="tablist" aria-label="Content Tabs">
          <button
            class="tab-btn"
            id="tab-links"
            role="tab"
            aria-controls="panel-links"
            aria-selected="true"
          >
            Main Links
          </button>
          <button
            class="tab-btn"
            id="tab-projects"
            role="tab"
            aria-controls="panel-projects"
            aria-selected="false"
          >
            Projects
          </button>
        </div>

        <section class="tab-panel" id="panel-links" role="tabpanel" aria-labelledby="tab-links">
          <p class="section-title">Main Links</p>
          <div class="links" id="mainLinks"></div>
        </section>

        <section
          class="tab-panel"
          id="panel-projects"
          role="tabpanel"
          aria-labelledby="tab-projects"
          hidden
        >
          <p class="section-title">Projects</p>
          <div class="projects" id="projectsList"></div>
          <p class="section-title">Project Links</p>
          <div class="links" id="projectLinks"></div>
        </section>

        <p class="section-title">Socials</p>
        <div class="socials" id="socialLinks"></div>
      </article>

      <p class="footer" id="footerText">online now</p>
    </main>

    <script>
      const profileData = {
        name: "daeese",
        handle: "@daeese",
        bio: "Like... I do C# and JS... That's all ig, ah yes! I'm learning Assembly..",
        avatar: "./350f980d6d850b26cd5d2a227f267cd4.jpg",
        badges: ["C#", "JavaScript", "GMT-3"],
        links: [
          { label: "Contact Me", href: "mailto:rafaelpasquarella@gmail.com", tag: "E-Mail" },
          { id: "nowPlaying", label: "Now Playing", href: "https://open.spotify.com", tag: "Spotify" }
        ],
        spotify: {
          discordUserId: "1402344358199689348",
          refreshMs: 30000,
          onlySpotify: true
        },
        projects: [
          {
            title: "cornwallCORE Discord Application",
            description: "Utility and Automation discord bot for 32nd Regt. of Foot in https://discord.gg/constantes.",
            href: "https://discord.com/oauth2/authorize?client_id=1482173872848507062"
          },
          {
            title: "Soon...",
            description: ":p",
            href: ""
          }
        ],
        socials: [
          { label: "GitHub", href: "https://github.com/nunreasonable" },
          { label: "Discord", href: "https://discord.com/users/1402344358199689348" }
        ],
        footer: "Last updated March 2026"
      };

      document.title = profileData.name;
      const avatarEl = document.getElementById("avatar");
      avatarEl.src = profileData.avatar;
      avatarEl.addEventListener("error", () => {
        avatarEl.src =
          "https://images.unsplash.com/photo-1527980965255-d3b416303d12?q=80&w=256&auto=format&fit=crop";
      });
      document.getElementById("displayName").textContent = profileData.name;
      document.getElementById("handle").textContent = profileData.handle;
      document.getElementById("bio").textContent = profileData.bio;
      document.getElementById("footerText").textContent = profileData.footer;

      function normalizeUrl(rawUrl) {
        if (!rawUrl) {
          return "";
        }

        const trimmed = rawUrl.trim();
        const hasProtocol = /^(https?:\/\/|mailto:|tel:)/i.test(trimmed);
        return hasProtocol ? trimmed : `https://${trimmed}`;
      }

      function openProfileLink(rawUrl) {
        const safeUrl = normalizeUrl(rawUrl);
        if (!safeUrl) {
          return;
        }

        if (/^(mailto:|tel:)/i.test(safeUrl)) {
          window.location.href = safeUrl;
          return;
        }

        window.open(safeUrl, "_blank", "noopener,noreferrer");
      }

      const badgesEl = document.getElementById("badges");
      profileData.badges.forEach((badge) => {
        const item = document.createElement("li");
        item.textContent = badge;
        badgesEl.appendChild(item);
      });

      const linksEl = document.getElementById("mainLinks");
      profileData.links.forEach((link, i) => {
        const a = document.createElement("a");
        a.className = "link-btn";
        a.href = normalizeUrl(link.href) || "#";
        a.dataset.url = link.href;
        a.dataset.linkId = link.id || "";
        a.target = "_blank";
        a.rel = "noreferrer noopener";
        a.style.animationDelay = `${100 + i * 75}ms`;
        a.innerHTML = `<span class="left">${link.label}</span><span class="right">${link.tag}</span>`;
        linksEl.appendChild(a);
      });

      function formatNowPlayingLabel(trackTitle, artistName) {
        return `Now Playing: ${trackTitle} - ${artistName}`;
      }

      function refreshNowPlayingTitleFit() {
        const titleEl = linksEl.querySelector('[data-link-id="nowPlaying"] .now-playing-title');
        if (!titleEl) {
          return;
        }

        const innerEl = titleEl.querySelector(".now-playing-title-inner");
        if (!innerEl) {
          return;
        }

        titleEl.classList.remove("is-scrolling");
        titleEl.style.removeProperty("--marquee-distance");
        titleEl.style.removeProperty("--marquee-duration");

        const overflowAmount = Math.ceil(innerEl.scrollWidth - titleEl.clientWidth);
        if (overflowAmount <= 4) {
          return;
        }

        const durationSeconds = Math.min(18, Math.max(6, overflowAmount / 24));
        titleEl.style.setProperty("--marquee-distance", `${overflowAmount}px`);
        titleEl.style.setProperty("--marquee-duration", `${durationSeconds}s`);
        titleEl.classList.add("is-scrolling");
      }

      function setNowPlayingState(state) {
        const nowPlayingLink = linksEl.querySelector('[data-link-id="nowPlaying"]');
        if (!nowPlayingLink) {
          return;
        }

        const left = nowPlayingLink.querySelector(".left");
        const right = nowPlayingLink.querySelector(".right");
        if (!left || !right) {
          return;
        }

        if (!state || !state.isPlaying) {
          const idleMessage = state && state.message ? state.message : "Spotify status idle";
          left.innerHTML = `
            <span class="now-playing-left">
              <img
                class="now-playing-cover"
                src="https://i.scdn.co/image/ab67616d00001e02a0f8b88f0a2b2b3d92d8f57f"
                alt="No track artwork"
              />
              <span class="now-playing-text">
                <span class="now-playing-title"><span class="now-playing-title-inner">Not listening right now</span></span>
                <span class="now-playing-subtitle">${idleMessage}</span>
              </span>
            </span>
          `;
          right.textContent = "Spotify";
          nowPlayingLink.dataset.url = "https://open.spotify.com";
          nowPlayingLink.href = "https://open.spotify.com";
          refreshNowPlayingTitleFit();
          return;
        }

        left.innerHTML = `
          <span class="now-playing-left">
            <img class="now-playing-cover" src="${state.imageUrl}" alt="Album artwork" />
            <span class="now-playing-text">
              <span class="now-playing-title"><span class="now-playing-title-inner">${formatNowPlayingLabel(state.title, state.artist)}</span></span>
              <span class="now-playing-subtitle">${state.album || "Live on Spotify"}</span>
            </span>
          </span>
        `;
        right.textContent = "Live";
        nowPlayingLink.dataset.url = state.trackUrl;
        nowPlayingLink.href = state.trackUrl;
        refreshNowPlayingTitleFit();
      }

      async function fetchNowPlayingFromLanyard(discordUserId) {
        const response = await fetch(`https://api.lanyard.rest/v1/users/${encodeURIComponent(discordUserId)}`);
        if (!response.ok) {
          throw new Error("Failed to fetch Lanyard status.");
        }

        const payload = await response.json();
        if (!payload.success || !payload.data) {
          const errorMessage =
            payload.error && payload.error.message
              ? payload.error.message
              : "Spotify status unavailable";
          return { isPlaying: false, message: errorMessage };
        }

        const data = payload.data;
        const spotifyOnlyMode = !profileData.spotify || profileData.spotify.onlySpotify !== false;

        function parseSpotifyState(rawSpotify) {
          if (!rawSpotify) {
            return null;
          }

          const trackUrl = rawSpotify.track_id
            ? `https://open.spotify.com/track/${rawSpotify.track_id}`
            : "https://open.spotify.com";

          return {
            isPlaying: true,
            title: rawSpotify.song || "Unknown song",
            artist: rawSpotify.artist || "Unknown artist",
            album: rawSpotify.album || "",
            imageUrl:
              rawSpotify.album_art_url || "https://i.scdn.co/image/ab67616d00001e02a0f8b88f0a2b2b3d92d8f57f",
            trackUrl
          };
        }

        function parseSpotifyActivity(activities) {
          if (!Array.isArray(activities)) {
            return null;
          }

          const spotifyActivity = activities.find((activity) => {
            const name = typeof activity.name === "string" ? activity.name.toLowerCase() : "";
            return name === "spotify";
          });

          if (!spotifyActivity) {
            return null;
          }

          const details = spotifyActivity.details || "Unknown song";
          const state = spotifyActivity.state || "Unknown artist";
          const album = spotifyActivity.assets?.large_text || "";
          const syncId = spotifyActivity.sync_id || "";
          const largeImage = spotifyActivity.assets?.large_image || "";
          const imageId = largeImage.startsWith("spotify:") ? largeImage.slice(8) : "";

          return {
            isPlaying: true,
            title: details,
            artist: state,
            album,
            imageUrl: imageId
              ? `https://i.scdn.co/image/${imageId}`
              : "https://i.scdn.co/image/ab67616d00001e02a0f8b88f0a2b2b3d92d8f57f",
            trackUrl: syncId ? `https://open.spotify.com/track/${syncId}` : "https://open.spotify.com"
          };
        }

        const directSpotifyState = parseSpotifyState(data.spotify);
        const activitySpotifyState = parseSpotifyActivity(data.activities);
        const spotifyState = directSpotifyState || activitySpotifyState;

        if (!spotifyState) {
          return { isPlaying: false };
        }

        if (spotifyOnlyMode && data.listening_to_spotify === false && !activitySpotifyState) {
          return { isPlaying: false };
        }

        return spotifyState;
      }

      async function refreshNowPlaying() {
        if (!profileData.spotify || !profileData.spotify.discordUserId) {
          setNowPlayingState({ isPlaying: false });
          return;
        }

        try {
          const state = await fetchNowPlayingFromLanyard(profileData.spotify.discordUserId);
          setNowPlayingState(state);
        } catch (error) {
          setNowPlayingState({ isPlaying: false });
        }
      }

      refreshNowPlaying();
      setInterval(refreshNowPlaying, profileData.spotify.refreshMs || 30000);

      window.addEventListener("resize", () => {
        refreshNowPlayingTitleFit();
      });

      linksEl.addEventListener("click", (event) => {
        const linkButton = event.target.closest(".link-btn");
        if (!linkButton) {
          return;
        }

        event.preventDefault();
        openProfileLink(linkButton.dataset.url);
      });

      const projectsEl = document.getElementById("projectsList");
      profileData.projects.forEach((project) => {
        const card = document.createElement("article");
        card.className = "project-card";
        card.innerHTML = `<h3 class="project-title">${project.title}</h3><p class="project-desc">${project.description}</p>`;
        projectsEl.appendChild(card);
      });

      const projectLinksEl = document.getElementById("projectLinks");
      const projectsWithLinks = profileData.projects.filter((project) => project.href && project.href.trim());

      if (projectsWithLinks.length === 0) {
        const emptyText = document.createElement("p");
        emptyText.className = "project-links-empty";
        emptyText.textContent = "Add project URLs in profileData.projects to show them here.";
        projectLinksEl.appendChild(emptyText);
      } else {
        projectsWithLinks.forEach((project, i) => {
          const a = document.createElement("a");
          a.className = "link-btn";
          a.href = normalizeUrl(project.href) || "#";
          a.dataset.url = project.href;
          a.target = "_blank";
          a.rel = "noreferrer noopener";
          a.style.animationDelay = `${100 + i * 75}ms`;
          a.innerHTML = `<span class="left">${project.title}</span><span class="right">Open</span>`;
          projectLinksEl.appendChild(a);
        });
      }

      projectLinksEl.addEventListener("click", (event) => {
        const linkButton = event.target.closest(".link-btn");
        if (!linkButton) {
          return;
        }

        event.preventDefault();
        openProfileLink(linkButton.dataset.url);
      });

      const tabButtons = document.querySelectorAll(".tab-btn");
      const tabPanels = document.querySelectorAll(".tab-panel");

      function setActiveTab(tabId) {
        tabButtons.forEach((button) => {
          const isSelected = button.id === tabId;
          button.setAttribute("aria-selected", isSelected ? "true" : "false");
        });

        tabPanels.forEach((panel) => {
          const shouldShow = panel.getAttribute("aria-labelledby") === tabId;
          panel.hidden = !shouldShow;
        });
      }

      tabButtons.forEach((button) => {
        button.addEventListener("click", () => {
          setActiveTab(button.id);
        });
      });

      const socialsEl = document.getElementById("socialLinks");
      profileData.socials.forEach((social) => {
        const a = document.createElement("a");
        a.href = normalizeUrl(social.href) || "#";
        a.dataset.url = social.href;
        a.target = "_blank";
        a.rel = "noreferrer noopener";
        a.textContent = social.label;
        socialsEl.appendChild(a);
      });

      socialsEl.addEventListener("click", (event) => {
        const socialLink = event.target.closest("a");
        if (!socialLink) {
          return;
        }

        event.preventDefault();
        openProfileLink(socialLink.dataset.url);
      });
    </script>
  </body>
</html>
