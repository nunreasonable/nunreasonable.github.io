<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meet daeeseD</title>
    <link rel="icon" type="image/svg+xml" href="./lal.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-start: #800026;
        --bg-end: #20000c;
        --website-bg-image: none;
        --card: rgba(0, 0, 0, 0.685);
        --card-border: rgba(189, 0, 104, 0.342);
        --card-bg-image: none;
        --text: #e7eef7;
        --muted: #9caac0;
        --accent: #9e002f;
        --accent-2: #440114;
        --button-bg: rgba(255, 255, 255, 0.07);
        --button-hover: rgba(255, 255, 255, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        width: 100%;
        overflow-x: clip;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        image-rendering: -webkit-optimize-contrast;
      }

      body {
        font-family: "Space Grotesk", sans-serif;
        color: var(--text);
        background: var(--website-bg-image), radial-gradient(
            circle at 20% 15%,
            rgba(0, 0, 0, 0.336) 0,
            rgba(242, 184, 74, 0) 38%
          ),
          radial-gradient(
            circle at 80% 80%,
            rgba(0, 0, 0, 0.384) 0,
            rgba(111, 208, 222, 0) 35%
          ),
          linear-gradient(155deg, var(--bg-start), var(--bg-end));
        background-size: cover, auto, auto, auto;
        background-position: center, auto, auto, auto;
        background-attachment: fixed;
        display: grid;
        place-items: center;
        overflow-x: hidden;
      }

      body.has-video-bg {
        background: radial-gradient(
            circle at 20% 15%,
            rgba(0, 0, 0, 0.2) 0,
            rgba(242, 184, 74, 0) 40%
          ),
          radial-gradient(
            circle at 80% 80%,
            rgba(0, 0, 0, 0.24) 0,
            rgba(111, 208, 222, 0) 36%
          ),
          linear-gradient(155deg, rgba(22, 3, 10, 0.5), rgba(10, 2, 6, 0.68));
      }

      .video-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
        background-color: #050505;
      }

      .video-bg video {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 100vw;
        height: 56.25vw;
        min-width: 177.78vh;
        min-height: 100vh;
        transform: translate(-50%, -50%);
        border: 0;
        object-fit: cover;
        filter: brightness(0.7) saturate(1.15) contrast(1.05);
      }

      .video-bg.loading::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.4));
      }

      .noise {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        opacity: 0.08;
        background-image: radial-gradient(#ffffff 0.45px, transparent 0.45px);
        background-size: 2px 2px;
      }

      .halo {
        position: fixed;
        z-index: 1;
        border-radius: 999px;
        filter: blur(42px);
        opacity: 0.38;
        pointer-events: none;
        animation: float 12s ease-in-out infinite;
      }

      .halo-1 {
        width: 260px;
        height: 260px;
        top: -90px;
        left: -80px;
        background: #080000b2;
      }

      .halo-2 {
        width: 220px;
        height: 220px;
        right: -70px;
        bottom: -50px;
        background: #00000088;
        animation-delay: -6s;
      }

      .blur-overlay {
        position: fixed;
        inset: 0;
        background: rgba(16, 6, 10, 0.28);
        backdrop-filter: blur(22px) saturate(1.25);
        -webkit-backdrop-filter: blur(22px) saturate(1.25);
        z-index: 999;
        display: grid;
        place-items: center;
        pointer-events: all;
        cursor: pointer;
        transition: opacity 220ms ease, background-color 220ms ease, backdrop-filter 220ms ease;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      .blur-overlay.hidden {
        display: none;
      }

      .blur-overlay:active {
        background: rgba(16, 6, 10, 0.36);
      }

      .blur-overlay::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.14),
          rgba(255, 255, 255, 0.02) 42%,
          rgba(255, 255, 255, 0.08) 100%
        );
        pointer-events: none;
      }

      .blur-message {
        position: relative;
        text-align: center;
        color: var(--text);
        font-size: 1.2rem;
        letter-spacing: 0.05em;
        animation: pulse-text 1.5s ease infinite;
        padding: 14px 18px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.22);
      }

      @keyframes pulse-text {
        0%, 100% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
      }

      .site {
        width: min(620px, 92vw);
        max-width: 100%;
        margin: 24px auto;
        padding: 0 8px;
        position: relative;
        z-index: 2;
        animation: fade-in 0.75s ease both;
      }

      .card {
        border: 1px solid var(--card-border);
        border-radius: 22px;
        background: var(--card);
        background-image: var(--card-bg-image);
        background-size: cover;
        background-position: center;
        backdrop-filter: blur(12px);
        padding: 28px 22px;
        width: 100%;
        overflow: clip;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
      }

      .card-wrapper {
        width: 100%;
      }

      .top {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        text-align: center;
      }

      .avatar {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid rgba(255, 255, 255, 0.28);
        margin-top: 0;
        z-index: 50;
        image-rendering: -webkit-optimize-contrast;
        filter: contrast(1.05) brightness(1.02) saturate(1.1);
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        position: relative;
      }

      .name-handle-wrap {
        display: flex;
        align-items: center;
        gap: 16px;
        justify-content: center;
        width: 100%;
      }

      .name-wrap {
        min-width: 0;
      }

      .name {
        margin: 0;
        font-family: "Bebas Neue", sans-serif;
        letter-spacing: 1px;
        font-size: clamp(2.1rem, 3.5vw, 2.8rem);
        line-height: 0.92;
      }

      .handle {
        margin: 4px 0 0;
        color: var(--muted);
        font-weight: 500;
      }

      .socials-inline {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
      }

      .socials-inline a {
        text-decoration: none;
        color: var(--text);
        cursor: pointer;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 0.8rem;
        background: rgba(255, 255, 255, 0.05);
        transition: background 160ms ease, border-color 160ms ease;
      }

      .socials-inline a:hover {
        border-color: rgba(255, 255, 255, 0.28);
        background: rgba(255, 255, 255, 0.08);
      }

      .bio {
        margin: 18px 0 8px;
        color: #d2deee;
        line-height: 1.52;
      }

      .badges {
        list-style: none;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 16px 0 0;
        padding: 0;
      }

      .badges li {
        font-size: 0.83rem;
        border: 1px solid rgba(255, 255, 255, 0.16);
        padding: 6px 10px;
        border-radius: 999px;
        color: #d9e7f9;
        background: rgba(255, 255, 255, 0.04);
      }

      .section-title {
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        margin: 24px 2px 10px;
      }

      .tabs {
        display: flex;
        gap: 8px;
        margin: 24px 0 12px;
      }

      .tab-btn {
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 0.82rem;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 160ms ease, border-color 160ms ease;
      }

      .tab-btn[aria-selected="true"] {
        background: rgba(255, 255, 255, 0.14);
        border-color: rgba(255, 255, 255, 0.35);
      }

      .tab-panel[hidden] {
        display: none;
      }

      .links {
        display: grid;
        gap: 10px;
        min-width: 0;
      }

      .link-btn {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        column-gap: 12px;
        min-width: 0;
        width: 100%;
        max-width: 100%;
        text-decoration: none;
        cursor: pointer;
        color: var(--text);
        padding: 12px 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        background: var(--button-bg);
        transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
        transform: translateY(14px);
        opacity: 0;
        animation: slide-up 0.45s ease forwards;
      }

      .link-btn:hover {
        background: var(--button-hover);
        border-color: rgba(255, 255, 255, 0.3);
        transform: translateY(-1px);
      }

      .link-btn .left {
        display: block;
        flex: 1 1 auto;
        font-weight: 600;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .now-playing-left {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        max-width: 100%;
        min-width: 0;
      }

      .now-playing-cover {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        object-fit: cover;
        flex-shrink: 0;
          image-rendering: -webkit-optimize-contrast;
          filter: contrast(1.05) brightness(1.02) saturate(1.1);
        border: 1px solid rgba(255, 255, 255, 0.14);
      }

      .now-playing-text {
        display: flex;
        flex: 1 1 auto;
        flex-direction: column;
        min-width: 0;
      }

      .now-playing-title {
        display: block;
        font-weight: 600;
        max-width: 100%;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .now-playing-title-inner {
        display: inline-block;
        white-space: nowrap;
        transform: translateX(0);
      }

      .now-playing-title.is-scrolling {
        text-overflow: clip;
      }

      .now-playing-title.is-scrolling .now-playing-title-inner {
        animation: marquee-x var(--marquee-duration, 8s) linear infinite alternate;
      }

      .now-playing-subtitle {
        display: block;
        font-size: 0.8rem;
        color: var(--muted);
        max-width: 100%;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .link-btn .right {
        color: var(--accent-2);
        font-size: 0.83rem;
      }

      .socials {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        min-width: 0;
      }

      .projects {
        display: grid;
        gap: 10px;
      }

      .project-card {
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 12px;
        padding: 12px 14px;
        background: rgba(255, 255, 255, 0.04);
      }

      .project-title {
        margin: 0;
        font-size: 1rem;
      }

      .project-desc {
        margin: 6px 0 0;
        color: #d2deee;
        font-size: 0.93rem;
        line-height: 1.4;
      }

      .project-links-empty {
        margin: 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .socials a {
        text-decoration: none;
        color: var(--text);
        cursor: pointer;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 0.9rem;
        background: rgba(255, 255, 255, 0.05);
      }

      .socials a:hover {
        border-color: rgba(255, 255, 255, 0.28);
      }

      .footer {
        margin-top: 18px;
        color: var(--muted);
        font-size: 0.83rem;
        text-align: center;
      }

      @keyframes fade-in {
        from {
          opacity: 0;
          transform: translateY(18px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes slide-up {
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translate(0, 0);
        }

        50% {
          transform: translate(10px, -12px);
        }
      }

      @keyframes marquee-x {
        from {
          transform: translateX(0);
        }

        to {
          transform: translateX(calc(-1 * var(--marquee-distance, 0px)));
        }
      }

        .player-modal {
        display: none;
        position: fixed;
        inset: 0;
        background: var(--website-bg-image), radial-gradient(
            circle at 20% 15%,
            rgba(0, 0, 0, 0.336) 0,
            rgba(242, 184, 74, 0) 38%
          ),
          radial-gradient(
            circle at 80% 80%,
            rgba(0, 0, 0, 0.384) 0,
            rgba(111, 208, 222, 0) 35%
          ),
          linear-gradient(155deg, var(--bg-start), var(--bg-end));
        background-size: cover, auto, auto, auto;
        background-position: center, auto, auto, auto;
        background-attachment: fixed;
        z-index: 1000;
        place-items: center;
        animation: fade-in 0.3s ease both;
      }

      .player-modal.active {
        display: grid;
      }

      .player-modal-content {
        width: min(500px, 90vw);
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 28px;
        padding: 40px 24px;
        text-align: center;
        backdrop-filter: blur(12px);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
        position: relative;
      }

      .player-close-btn {
        position: absolute;
        top: 16px;
        right: 16px;
        background: transparent;
        border: none;
        color: var(--text);
        font-size: 1.8rem;
        cursor: pointer;
        opacity: 0.7;
        transition: opacity 160ms ease;
        padding: 0;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .player-close-btn:hover {
        opacity: 1;
      }

      .player-album-art {
        width: 240px;
        height: 240px;
        border-radius: 16px;
        object-fit: cover;
        margin: 0 auto 24px;
        border: 2px solid rgba(255, 255, 255, 0.14);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        animation: spin 20s linear infinite;
        image-rendering: -webkit-optimize-contrast;
        filter: contrast(1.08) brightness(1.02) saturate(1.15);
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .player-track-title {
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0 0 8px;
      }

      .player-track-artist {
        font-size: 1.1rem;
        color: var(--muted);
        margin: 0 0 8px;
      }

      .player-track-album {
        font-size: 0.9rem;
        color: var(--muted);
        margin: 0 0 24px;
      }

      .player-progress {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        height: 6px;
        margin: 0 0 24px;
      }

      .player-progress-bar {
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        height: 100%;
        border-radius: 8px;
        width: 0%;
        animation: pulse 0.5s ease infinite;
      }

      @keyframes pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.8;
        }
      }

      .player-controls {
        display: flex;
        gap: 16px;
        justify-content: center;
        margin-top: 24px;
      }

      .player-btn {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: var(--text);
        border-radius: 50%;
        width: 50px;
        height: 50px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        transition: background 160ms ease, border-color 160ms ease;
      }

      .player-btn:hover {
        background: rgba(255, 255, 255, 0.15);
        border-color: rgba(255, 255, 255, 0.35);
      }

      .player-btn.play {
        width: 70px;
        height: 70px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        border-color: rgba(158, 0, 47, 0.5);
        font-size: 1.6rem;
      }

      .player-btn.play:hover {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        filter: brightness(1.1);
      }

      .click-to-enter {
        cursor: pointer;
        transition: all 160ms ease;
        position: relative;
      }

      .click-to-enter:hover {
        transform: scale(1.02);
      }

      .click-to-enter::after {
        content: "click to enter";
        position: absolute;
        bottom: -24px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.75rem;
        color: var(--muted);
        white-space: nowrap;
        opacity: 0;
        transition: opacity 160ms ease;
      }

      .click-to-enter:hover::after {
        opacity: 1;
      }

      @media (max-width: 640px) {
        .site {
          width: min(620px, 100vw);
          margin: 14px auto;
          padding: 0 10px;
        }

        .card {
          padding: 20px 16px;
          border-radius: 16px;
        }

        .top {
          align-items: center;
        }

        .avatar {
          width: 90px;
          height: 90px;
          margin-top: -55px;
        }

        .name-handle-wrap {
          flex-direction: column;
          gap: 8px;
        }

        .socials-inline {
          width: 100%;
        }



        .tabs {
          margin: 20px 0 10px;
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .tab-btn {
          width: 100%;
          padding: 9px 8px;
          font-size: 0.75rem;
          text-align: center;
        }

        .link-btn {
          padding: 11px 12px;
          gap: 10px;
          align-items: flex-start;
        }

        .link-btn .right {
          flex-shrink: 0;
          font-size: 0.77rem;
          white-space: nowrap;
          padding-top: 2px;
        }

        .now-playing-cover {
          width: 34px;
          height: 34px;
        }

        .socials {
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .socials a {
          text-align: center;
        }

        .player-modal-content {
          width: 95vw;
          padding: 24px 16px;
        }

        .player-album-art {
          width: 180px;
          height: 180px;
        }

        .player-track-title {
          font-size: 1.3rem;
        }

        .player-track-artist {
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="video-bg" id="videoBg" hidden>
      <video id="videoBgVideo" autoplay muted loop playsinline preload="auto">
        <source src="./videoplayback.mp4" type="video/mp4" />
      </video>
    </div>

    <div class="noise"></div>
    <div class="halo halo-1"></div>
    <div class="halo halo-2"></div>

    <div class="blur-overlay" id="blurOverlay">
      <div class="blur-message">click to enter</div>
    </div>

    <div class="player-modal" id="playerModal">
      <div class="player-modal-content">
        <button class="player-close-btn" id="playerCloseBtn">✕</button>
        <img class="player-album-art" id="playerAlbumArt" src="" alt="Album artwork" />
        <h2 class="player-track-title" id="playerTrackTitle">Not Playing</h2>
        <p class="player-track-artist" id="playerTrackArtist"></p>
        <p class="player-track-album" id="playerTrackAlbum"></p>
        <div class="player-progress">
          <div class="player-progress-bar" id="playerProgressBar"></div>
        </div>
        <div class="player-controls">
          <button class="player-btn" id="playerPrevBtn">⏮</button>
          <button class="player-btn play" id="playerPlayBtn">▶</button>
          <button class="player-btn" id="playerNextBtn">⏭</button>
        </div>
      </div>
    </div>

    <main class="site">
      <div class="card-wrapper">
        <article class="card" id="mainCard">
          <section class="top">
            <img
              class="avatar"
              id="avatar"
              src="./lal.jpg"
              alt="Profile avatar"
            />
            <div class="name-handle-wrap">
              <div class="name-wrap">
                <h1 class="name" id="displayName">DAEESE</h1>
                <p class="handle" id="handle">@daeese</p>
              </div>
              <div class="socials-inline" id="socialLinksInline"></div>
            </div>
          </section>

          <p class="bio" id="bio">
            Designer/developer crafting interfaces that feel alive. Building digital things,
            collecting inspiration, and sharing work in public.
          </p>

          <ul class="badges" id="badges"></ul>

          <div class="tabs" role="tablist" aria-label="Content Tabs">
            <button
              class="tab-btn"
              id="tab-links"
              role="tab"
              aria-controls="panel-links"
              aria-selected="true"
            >
              Main Links
            </button>
            <button
              class="tab-btn"
              id="tab-projects"
              role="tab"
              aria-controls="panel-projects"
              aria-selected="false"
            >
              Projects
            </button>
          </div>

          <section class="tab-panel" id="panel-links" role="tabpanel" aria-labelledby="tab-links">
            <p class="section-title">Main Links</p>
            <div class="links" id="mainLinks"></div>
          </section>

          <section
            class="tab-panel"
            id="panel-projects"
            role="tabpanel"
            aria-labelledby="tab-projects"
            hidden
          >
            <p class="section-title">Projects</p>
            <div class="projects" id="projectsList"></div>
            <p class="section-title">Project Links</p>
            <div class="links" id="projectLinks"></div>
          </section>
        </article>
      </div>

      <p class="footer" id="footerText">online now</p>
    </main>

    <script>
      // Sound Effects via Web Audio API
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();

      function playBeep(frequency = 800, duration = 100, volume = 0.3) {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain);
        gain.connect(audioContext.destination);
        osc.frequency.value = frequency;
        osc.type = 'sine';
        gain.gain.setValueAtTime(volume, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration / 1000);
        osc.start(audioContext.currentTime);
        osc.stop(audioContext.currentTime + duration / 1000);
      }

      function playSFX(type) {
        if (type === 'click') playBeep(600, 80, 0.2);
        else if (type === 'open') playBeep(1000, 120, 0.25);
        else if (type === 'close') playBeep(400, 120, 0.2);
        else if (type === 'hover') playBeep(700, 50, 0.15);
      }

      // Blur overlay handler
      const blurOverlay = document.getElementById("blurOverlay");
      blurOverlay.addEventListener("click", () => {
        playSFX('click');
        backgroundVideoEl.play().catch(() => {});
        blurOverlay.style.opacity = "0";
        blurOverlay.style.pointerEvents = "none";
        window.setTimeout(() => {
          blurOverlay.classList.add("hidden");
        }, 220);
      });

      const profileData = {
        name: "daeese",
        handle: "@daeese",
        bio: "Junior on C# and JavaScript, timezone is GMT-3 or UTC-3, working on cornwallCORE which you may check on my 'Projects' tab. I also play NW on roblox which... is kinda concerning. I'm open to commissions, just reach me through discord or the email, make sure to identify yourself... speacially on discord.",
        avatar: "./lal.jpg",
        backgroundImage: "", // Set your custom background image URL here
        websiteBackgroundImage: "./bg.jpg", // Website/body background image
        cardBackgroundImage: "", // Card background image (leave empty for transparent)
        badges: ["C#", "JavaScript", "GMT-3", "Gooba"],
        links: [
          { label: "Contact Me", href: "mailto:rafaelpasquarella@gmail.com", tag: "E-Mail" },
          { id: "nowPlaying", label: "Now Playing", href: "https://open.spotify.com", tag: "Spotify" }
        ],
        spotify: {
          discordUserId: "1402344358199689348",
          refreshMs: 30000,
          onlySpotify: true
        },
        projects: [
          {
            title: "cornwallCORE Discord Application",
            description: "Utility and Automation discord bot for 32nd Regt. of Foot in https://discord.gg/constantes.",
            href: "https://discord.com/oauth2/authorize?client_id=1482173872848507062"
          },
          {
            title: "Soon...",
            description: ":p",
            href: ""
          }
        ],
        socials: [
          { label: "GitHub", href: "https://github.com/nunreasonable" },
          { label: "Discord", href: "https://discord.com/users/1402344358199689348" }
        ],
        footer: "Last updated April 2026"
      };

      document.title = profileData.name;

      const backgroundVideoEl = document.getElementById("videoBgVideo");
      const videoBgEl = document.getElementById("videoBg");

      function applyVideoBackground() {
        if (!videoBgEl || !backgroundVideoEl) {
          return false;
        }

        videoBgEl.hidden = false;
        document.body.classList.add("has-video-bg");
        backgroundVideoEl.play().catch(() => {});
        return true;
      }

      let isVideoBackgroundActive = applyVideoBackground();
      
      // Apply website background image if provided
      if (!isVideoBackgroundActive && profileData.websiteBackgroundImage) {
        document.documentElement.style.setProperty("--website-bg-image", `url('${profileData.websiteBackgroundImage}')`);
      }
      
      // Apply card background image if provided
      if (profileData.cardBackgroundImage) {
        const mainCard = document.getElementById("mainCard");
        mainCard.style.setProperty("--card-bg-image", `url('${profileData.cardBackgroundImage}')`);
      }
      
      const avatarEl = document.getElementById("avatar");
      // Load avatar from profile data if available
      if (profileData.avatar) {
        avatarEl.src = profileData.avatar;
      }
      avatarEl.addEventListener("error", () => {
        avatarEl.src =
          "https://images.unsplash.com/photo-1527980965255-d3b416303d12?q=80&w=256&auto=format&fit=crop";
      });
      document.getElementById("displayName").textContent = profileData.name;
      document.getElementById("handle").textContent = profileData.handle;
      document.getElementById("bio").textContent = profileData.bio;
      document.getElementById("footerText").textContent = profileData.footer;

      function normalizeUrl(rawUrl) {
        if (!rawUrl) {
          return "";
        }

        const trimmed = rawUrl.trim();
        const hasProtocol = /^(https?:\/\/|mailto:|tel:)/i.test(trimmed);
        return hasProtocol ? trimmed : `https://${trimmed}`;
      }

      function openProfileLink(rawUrl) {
        const safeUrl = normalizeUrl(rawUrl);
        if (!safeUrl) {
          return;
        }

        if (/^(mailto:|tel:)/i.test(safeUrl)) {
          window.location.href = safeUrl;
          return;
        }

        window.open(safeUrl, "_blank", "noopener,noreferrer");
      }

      const badgesEl = document.getElementById("badges");
      profileData.badges.forEach((badge) => {
        const item = document.createElement("li");
        item.textContent = badge;
        badgesEl.appendChild(item);
      });

      const linksEl = document.getElementById("mainLinks");
      profileData.links.forEach((link, i) => {
        const a = document.createElement("a");
        a.className = "link-btn";
        a.href = normalizeUrl(link.href) || "#";
        a.dataset.url = link.href;
        a.dataset.linkId = link.id || "";
        a.target = "_blank";
        a.rel = "noreferrer noopener";
        a.style.animationDelay = `${100 + i * 75}ms`;
        a.innerHTML = `<span class="left">${link.label}</span><span class="right">${link.tag}</span>`;
        linksEl.appendChild(a);
      });

      function formatNowPlayingLabel(trackTitle, artistName) {
        return `Now Playing: ${trackTitle} - ${artistName}`;
      }

      function refreshNowPlayingTitleFit() {
        const titleEl = linksEl.querySelector('[data-link-id="nowPlaying"] .now-playing-title');
        if (!titleEl) {
          return;
        }

        const innerEl = titleEl.querySelector(".now-playing-title-inner");
        if (!innerEl) {
          return;
        }

        titleEl.classList.remove("is-scrolling");
        titleEl.style.removeProperty("--marquee-distance");
        titleEl.style.removeProperty("--marquee-duration");

        const overflowAmount = Math.ceil(innerEl.scrollWidth - titleEl.clientWidth);
        if (overflowAmount <= 4) {
          return;
        }

        const durationSeconds = Math.min(18, Math.max(6, overflowAmount / 24));
        titleEl.style.setProperty("--marquee-distance", `${overflowAmount}px`);
        titleEl.style.setProperty("--marquee-duration", `${durationSeconds}s`);
        titleEl.classList.add("is-scrolling");
      }

      function setNowPlayingState(state) {
        // Update player modal state
        currentNowPlayingState = state;

        const nowPlayingLink = linksEl.querySelector('[data-link-id="nowPlaying"]');
        if (!nowPlayingLink) {
          return;
        }

        const left = nowPlayingLink.querySelector(".left");
        const right = nowPlayingLink.querySelector(".right");
        if (!left || !right) {
          return;
        }

        if (!state || !state.isPlaying) {
          const idleMessage = state && state.message ? state.message : "Spotify status idle";
          left.innerHTML = `
            <span class="now-playing-left">
              <img
                class="now-playing-cover"
                src="https://i.scdn.co/image/ab67616d00001e02a0f8b88f0a2b2b3d92d8f57f"
                alt="No track artwork"
              />
              <span class="now-playing-text">
                <span class="now-playing-title"><span class="now-playing-title-inner">Not listening right now</span></span>
                <span class="now-playing-subtitle">${idleMessage}</span>
              </span>
            </span>
          `;
          right.textContent = "Spotify";
          nowPlayingLink.dataset.url = "https://open.spotify.com";
          nowPlayingLink.href = "https://open.spotify.com";
          refreshNowPlayingTitleFit();
          return;
        }

        left.innerHTML = `
          <span class="now-playing-left">
            <img class="now-playing-cover" src="${state.imageUrl}" alt="Album artwork" />
            <span class="now-playing-text">
              <span class="now-playing-title"><span class="now-playing-title-inner">${formatNowPlayingLabel(state.title, state.artist)}</span></span>
              <span class="now-playing-subtitle">${state.album || "Live on Spotify"}</span>
            </span>
          </span>
        `;
        right.textContent = "Live";
        nowPlayingLink.dataset.url = state.trackUrl;
        nowPlayingLink.href = state.trackUrl;
        refreshNowPlayingTitleFit();
      }

      async function fetchNowPlayingFromLanyard(discordUserId) {
        const response = await fetch(`https://api.lanyard.rest/v1/users/${encodeURIComponent(discordUserId)}`);
        if (!response.ok) {
          throw new Error("Failed to fetch Lanyard status.");
        }

        const payload = await response.json();
        if (!payload.success || !payload.data) {
          const errorMessage =
            payload.error && payload.error.message
              ? payload.error.message
              : "Spotify status unavailable";
          return { isPlaying: false, message: errorMessage };
        }

        const data = payload.data;
        const spotifyOnlyMode = !profileData.spotify || profileData.spotify.onlySpotify !== false;

        function parseSpotifyState(rawSpotify) {
          if (!rawSpotify) {
            return null;
          }

          const trackUrl = rawSpotify.track_id
            ? `https://open.spotify.com/track/${rawSpotify.track_id}`
            : "https://open.spotify.com";

          return {
            isPlaying: true,
            title: rawSpotify.song || "Unknown song",
            artist: rawSpotify.artist || "Unknown artist",
            album: rawSpotify.album || "",
            imageUrl:
              rawSpotify.album_art_url || "https://i.scdn.co/image/ab67616d00001e02a0f8b88f0a2b2b3d92d8f57f",
            trackUrl
          };
        }

        function parseSpotifyActivity(activities) {
          if (!Array.isArray(activities)) {
            return null;
          }

          const spotifyActivity = activities.find((activity) => {
            const name = typeof activity.name === "string" ? activity.name.toLowerCase() : "";
            return name === "spotify";
          });

          if (!spotifyActivity) {
            return null;
          }

          const details = spotifyActivity.details || "Unknown song";
          const state = spotifyActivity.state || "Unknown artist";
          const album = spotifyActivity.assets?.large_text || "";
          const syncId = spotifyActivity.sync_id || "";
          const largeImage = spotifyActivity.assets?.large_image || "";
          const imageId = largeImage.startsWith("spotify:") ? largeImage.slice(8) : "";

          return {
            isPlaying: true,
            title: details,
            artist: state,
            album,
            imageUrl: imageId
              ? `https://i.scdn.co/image/${imageId}`
              : "https://i.scdn.co/image/ab67616d00001e02a0f8b88f0a2b2b3d92d8f57f",
            trackUrl: syncId ? `https://open.spotify.com/track/${syncId}` : "https://open.spotify.com"
          };
        }

        const directSpotifyState = parseSpotifyState(data.spotify);
        const activitySpotifyState = parseSpotifyActivity(data.activities);
        const spotifyState = directSpotifyState || activitySpotifyState;

        if (!spotifyState) {
          return { isPlaying: false };
        }

        if (spotifyOnlyMode && data.listening_to_spotify === false && !activitySpotifyState) {
          return { isPlaying: false };
        }

        return spotifyState;
      }

      async function refreshNowPlaying() {
        if (!profileData.spotify || !profileData.spotify.discordUserId) {
          setNowPlayingState({ isPlaying: false });
          return;
        }

        try {
          const state = await fetchNowPlayingFromLanyard(profileData.spotify.discordUserId);
          setNowPlayingState(state);
        } catch (error) {
          setNowPlayingState({ isPlaying: false });
        }
      }

      refreshNowPlaying();
      setInterval(refreshNowPlaying, profileData.spotify.refreshMs || 30000);

      window.addEventListener("resize", () => {
        refreshNowPlayingTitleFit();
      });

      // Player Modal Logic
      const playerModal = document.getElementById("playerModal");
      const playerCloseBtn = document.getElementById("playerCloseBtn");
      let currentNowPlayingState = null;

      function openPlayerModal() {
        playerModal.classList.add("active");
        updatePlayerDisplay();
      }

      function closePlayerModal() {
        playerModal.classList.remove("active");
        playSFX('close');
      }

      playerCloseBtn.addEventListener("click", closePlayerModal);

      playerModal.addEventListener("click", (event) => {
        if (event.target === playerModal) {
          closePlayerModal();
        }
      });

      function updatePlayerDisplay() {
        if (!currentNowPlayingState || !currentNowPlayingState.isPlaying) {
          document.getElementById("playerTrackTitle").textContent = "Not Playing";
          document.getElementById("playerTrackArtist").textContent = "Start listening on Spotify";
          document.getElementById("playerTrackAlbum").textContent = "";
          document.getElementById("playerAlbumArt").src = "https://i.scdn.co/image/ab67616d00001e02a0f8b88f0a2b2b3d92d8f57f";
          return;
        }

        document.getElementById("playerTrackTitle").textContent = currentNowPlayingState.title;
        document.getElementById("playerTrackArtist").textContent = currentNowPlayingState.artist;
        document.getElementById("playerTrackAlbum").textContent = currentNowPlayingState.album || "Live on Spotify";
        document.getElementById("playerAlbumArt").src = currentNowPlayingState.imageUrl;
      }

      // Player controls with SFX
      document.getElementById("playerPlayBtn").addEventListener("click", () => {
        playSFX('click');
        window.open("https://open.spotify.com", "_blank", "noopener,noreferrer");
      });

      document.getElementById("playerPrevBtn").addEventListener("click", () => {
        playSFX('click');
      });

      document.getElementById("playerNextBtn").addEventListener("click", () => {
        playSFX('click');
      });

      linksEl.addEventListener("click", (event) => {
        const linkButton = event.target.closest(".link-btn");
        if (!linkButton) {
          return;
        }

        event.preventDefault();
        
        // Check if it's the now playing link
        if (linkButton.dataset.linkId === "nowPlaying") {
          playSFX('open');
          openPlayerModal();
          return;
        }
        
        openProfileLink(linkButton.dataset.url);
      });

      // Hover SFX
      document.querySelectorAll(".link-btn, .player-btn, .socials a").forEach(el => {
        el.addEventListener("mouseenter", () => {
          playSFX('hover');
        });
      });

      const projectsEl = document.getElementById("projectsList");
      profileData.projects.forEach((project) => {
        const card = document.createElement("article");
        card.className = "project-card";
        card.innerHTML = `<h3 class="project-title">${project.title}</h3><p class="project-desc">${project.description}</p>`;
        projectsEl.appendChild(card);
      });

      const projectLinksEl = document.getElementById("projectLinks");
      const projectsWithLinks = profileData.projects.filter((project) => project.href && project.href.trim());

      if (projectsWithLinks.length === 0) {
        const emptyText = document.createElement("p");
        emptyText.className = "project-links-empty";
        emptyText.textContent = "Add project URLs in profileData.projects to show them here.";
        projectLinksEl.appendChild(emptyText);
      } else {
        projectsWithLinks.forEach((project, i) => {
          const a = document.createElement("a");
          a.className = "link-btn";
          a.href = normalizeUrl(project.href) || "#";
          a.dataset.url = project.href;
          a.target = "_blank";
          a.rel = "noreferrer noopener";
          a.style.animationDelay = `${100 + i * 75}ms`;
          a.innerHTML = `<span class="left">${project.title}</span><span class="right">Open</span>`;
          projectLinksEl.appendChild(a);
        });
      }

      projectLinksEl.addEventListener("click", (event) => {
        const linkButton = event.target.closest(".link-btn");
        if (!linkButton) {
          return;
        }

        event.preventDefault();
        openProfileLink(linkButton.dataset.url);
      });

      const tabButtons = document.querySelectorAll(".tab-btn");
      const tabPanels = document.querySelectorAll(".tab-panel");

      function setActiveTab(tabId) {
        tabButtons.forEach((button) => {
          const isSelected = button.id === tabId;
          button.setAttribute("aria-selected", isSelected ? "true" : "false");
        });

        tabPanels.forEach((panel) => {
          const shouldShow = panel.getAttribute("aria-labelledby") === tabId;
          panel.hidden = !shouldShow;
        });
      }

      tabButtons.forEach((button) => {
        button.addEventListener("click", () => {
          setActiveTab(button.id);
        });
      });

      const socialsInlineEl = document.getElementById("socialLinksInline");
      
      profileData.socials.forEach((social) => {
        // Inline socials (beside name)
        const aInline = document.createElement("a");
        aInline.href = normalizeUrl(social.href) || "#";
        aInline.dataset.url = social.href;
        aInline.target = "_blank";
        aInline.rel = "noreferrer noopener";
        aInline.textContent = social.label;
        socialsInlineEl.appendChild(aInline);
      });

      socialsInlineEl.addEventListener("click", (event) => {
        const socialLink = event.target.closest("a");
        if (!socialLink) {
          return;
        }

        event.preventDefault();
        playSFX('click');
        openProfileLink(socialLink.dataset.url);
      });
    </script>
  </body>
</html>
