<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cornwall Terms of Service</title>
    <meta name="description" content="Direct entry point for the Cornwall Discord Bot Terms of Service." />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d1117;
        --panel: rgba(17, 24, 39, 0.94);
        --line: rgba(148, 163, 184, 0.18);
        --text: #e5eef8;
        --muted: #a8b3c5;
        --accent: #c084fc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(192, 132, 252, 0.16), transparent 30%),
          linear-gradient(160deg, var(--bg) 0%, #131926 100%);
      }

      .shell {
        width: min(1200px, calc(100% - 24px));
        margin: 0 auto;
        padding: 18px 0 24px;
      }

      .bar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: space-between;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 14px 16px;
        background: var(--panel);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.36);
      }

      .title {
        margin: 0;
        font-size: 1rem;
        letter-spacing: 0.02em;
      }

      .meta {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 9px 13px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--text);
        text-decoration: none;
        background: rgba(255, 255, 255, 0.04);
      }

      .button:hover,
      .button:focus-visible {
        background: rgba(255, 255, 255, 0.08);
        outline: none;
      }

      .frame {
        width: 100%;
        height: calc(100vh - 116px);
        border: 1px solid var(--line);
        border-radius: 22px;
        background: rgba(17, 24, 39, 0.72);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
        overflow: hidden;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: transparent;
      }

      @media (max-width: 720px) {
        .shell {
          width: min(100% - 14px, 1200px);
          padding-top: 8px;
        }

        .bar {
          padding: 12px;
        }

        .frame {
          height: calc(100vh - 140px);
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="bar">
        <div>
          <h1 class="title">Cornwall Terms of Service</h1>
          <p class="meta">Entry point for the cornwall.daeese.me/termsofservice route.</p>
        </div>
        <div class="actions">
          <a class="button" href="../tos.html">Open canonical page</a>
          <a class="button" href="/">Home</a>
        </div>
      </header>
      <section class="frame" aria-label="Terms of Service content">
        <iframe title="Cornwall Terms of Service" src="../tos.html"></iframe>
      </section>
    </main>
  </body>
</html>
