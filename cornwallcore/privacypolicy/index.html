<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>cornwallCORE Privacy Policy</title>
    <meta name="description" content="Direct entry point for the cornwallCORE APP Privacy Policy." />
    <link rel="icon" type="image/png" href="../../filearchive/cornwallCOREpfp.png" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d1117;
        --panel: rgba(17, 24, 39, 0.94);
        --line: rgba(148, 163, 184, 0.18);
        --text: #e5eef8;
        --muted: #a8b3c5;
        --accent: #34d399;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(52, 211, 153, 0.16), transparent 30%),
          linear-gradient(160deg, var(--bg) 0%, #131926 100%);
      }

      .shell {
        width: min(1200px, calc(100% - 24px));
        margin: 0 auto;
        padding: 18px 0 24px;
      }

      .frame {
        width: 100%;
        height: calc(100vh - 42px);
        border: 1px solid var(--line);
        border-radius: 22px;
        background: rgba(17, 24, 39, 0.72);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
        overflow: hidden;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: transparent;
      }

      @media (max-width: 720px) {
        .shell {
          width: min(100% - 14px, 1200px);
          padding-top: 8px;
        }

        .frame {
          height: calc(100vh - 32px);
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="frame" aria-label="Privacy Policy content">
        <iframe title="cornwallCORE Privacy Policy" src="./pp.html"></iframe>
      </section>
    </main>
  </body>
</html>
